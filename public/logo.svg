<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B5E20;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D3B12;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D48B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8941E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="3"/>
  
  <!-- Islamic geometric border pattern -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#D4AF37" stroke-width="1" stroke-dasharray="8,4" opacity="0.5"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Decorative corner elements -->
  <path d="M100 20 L105 30 L100 25 L95 30 Z" fill="#D4AF37" opacity="0.6"/>
  <path d="M100 180 L105 170 L100 175 L95 170 Z" fill="#D4AF37" opacity="0.6"/>
  <path d="M20 100 L30 95 L25 100 L30 105 Z" fill="#D4AF37" opacity="0.6"/>
  <path d="M180 100 L170 95 L175 100 L170 105 Z" fill="#D4AF37" opacity="0.6"/>
  
  <!-- Main Arabic letter Meem -->
  <text x="100" y="115" font-family="Amiri, serif" font-size="72" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle" dominant-baseline="middle">م</text>
  
  <!-- Small diamond accents -->
  <rect x="96" y="38" width="8" height="8" fill="#D4AF37" transform="rotate(45 100 42)" opacity="0.7"/>
  <rect x="96" y="154" width="8" height="8" fill="#D4AF37" transform="rotate(45 100 158)" opacity="0.7"/>
</svg>
